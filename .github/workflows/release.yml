name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev

      - name: Validate tag matches project version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag version v$TAG does not match pyproject version $VERSION"
            exit 1
          fi

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check

      - name: Unit tests
        run: uv run pytest tests/unit/ -v

  build:
    name: Build Package
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV=${{ steps.prev_tag.outputs.tag }}
          if [ -z "$PREV" ]; then
            git log --pretty=format:"- %s (%h)" "$TAG" > RELEASE_NOTES.txt
          else
            git log --pretty=format:"- %s (%h)" "${PREV}..${TAG}" > RELEASE_NOTES.txt
          fi
          if [ ! -s RELEASE_NOTES.txt ]; then
            echo "- Release $TAG" > RELEASE_NOTES.txt
          fi

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.txt
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --notes-file RELEASE_NOTES.txt
          fi

  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*
